<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1280">
  <title>.</title>
  <style>
    /* Screensaver for the 7.84" kiosk display (1280x400).
       Shows a dim bouncing clock with node name.
       Tap anywhere to return to the kiosk dashboard.
       Keeps pixels moving to prevent IPS image retention. */
    * { margin: 0; padding: 0; }

    body {
      background: #000;
      width: 1280px;
      height: 400px;
      overflow: hidden;
      cursor: none;
      user-select: none;
      -webkit-user-select: none;
    }

    /* Floating composite container — positioned via JS */
    .floater {
      position: absolute;
      display: flex;
      flex-direction: column;
      align-items: center;
      opacity: 0.35;
      transition: opacity 0.5s;
    }

    /* Logo row — CCC left, divider, LFHI right */
    .logo-row {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 2px;
      margin-top: 4px;
    }

    /* Each logo + text side by side */
    .logo-block {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-text {
      font-family: Impact, "Arial Black", "Helvetica Neue", sans-serif;
      font-size: 22px;
      font-weight: 900;
      color: #f5f5f5;
      line-height: 1.05;
      text-transform: uppercase;
      letter-spacing: 0.02em;
    }

    .logo-divider {
      width: 1px;
      height: 80px;
      background: #3d3d3d;
      flex-shrink: 0;
    }

    .time {
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
      font-size: 56px;
      font-weight: 700;
      color: #f5f5f5;
      letter-spacing: 0.04em;
    }

    .tap-hint {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 12px;
      font-weight: 500;
      color: #555;
      margin-top: 8px;
      letter-spacing: 0.06em;
    }

    /* Subtle star particles drifting in the background */
    .star {
      position: absolute;
      width: 2px;
      height: 2px;
      background: #fff;
      border-radius: 50%;
      opacity: 0;
      animation: twinkle var(--duration) var(--delay) infinite;
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0; }
      50% { opacity: var(--brightness); }
    }
  </style>
</head>
<body>

<!-- Background stars — subtle depth effect -->
<div id="stars"></div>

<!-- Bouncing composite element — logos + clock -->
<div class="floater" id="floater">

  <!-- Logo row: CCC hexagon cluster | divider | LFHI shield -->
  <div class="logo-row">

    <!-- CCC — C-shaped honeycomb with icons, text nests in the opening (matches real logo) -->
    <div class="logo-block">
      <svg width="95" height="110" viewBox="0 2 95 108" xmlns="http://www.w3.org/2000/svg">
        <!-- C-shaped honeycomb: hexagons arranged in a C curve -->
        <!-- Hex size: r=12 (flat-top). Row spacing: 21 vertical, 18 horizontal offset -->
        <!-- Top arm: 3 hexagons curving right -->
        <polygon points="38,5 48,5 53,14 48,23 38,23 33,14" fill="#555" stroke="#444" stroke-width="0.6"/>
        <polygon points="57,5 67,5 72,14 67,23 57,23 52,14" fill="#666" stroke="#444" stroke-width="0.6"/>
        <polygon points="76,5 86,5 91,14 86,23 76,23 71,14" fill="#555" stroke="#444" stroke-width="0.6"/>
        <!-- Upper left: 2 hexagons -->
        <polygon points="28,21 38,21 43,30 38,39 28,39 23,30" fill="#666" stroke="#444" stroke-width="0.6"/>
        <polygon points="47,21 57,21 62,30 57,39 47,39 42,30" fill="#555" stroke="#444" stroke-width="0.6"/>
        <!-- Middle left: 2 hexagons -->
        <polygon points="19,37 29,37 34,46 29,55 19,55 14,46" fill="#555" stroke="#444" stroke-width="0.6"/>
        <polygon points="38,37 48,37 53,46 48,55 38,55 33,46" fill="#666" stroke="#444" stroke-width="0.6"/>
        <!-- Lower left: 2 hexagons -->
        <polygon points="19,53 29,53 34,62 29,71 19,71 14,62" fill="#666" stroke="#444" stroke-width="0.6"/>
        <polygon points="38,53 48,53 53,62 48,71 38,71 33,62" fill="#555" stroke="#444" stroke-width="0.6"/>
        <!-- Lower middle: 2 hexagons -->
        <polygon points="28,69 38,69 43,78 38,87 28,87 23,78" fill="#555" stroke="#444" stroke-width="0.6"/>
        <polygon points="47,69 57,69 62,78 57,87 47,87 42,78" fill="#666" stroke="#444" stroke-width="0.6"/>
        <!-- Bottom arm: 3 hexagons curving right -->
        <polygon points="38,85 48,85 53,94 48,103 38,103 33,94" fill="#666" stroke="#444" stroke-width="0.6"/>
        <polygon points="57,85 67,85 72,94 67,103 57,103 52,94" fill="#555" stroke="#444" stroke-width="0.6"/>
        <polygon points="76,85 86,85 91,94 86,103 76,103 71,94" fill="#555" stroke="#444" stroke-width="0.6"/>

        <!-- Icons (white silhouettes in select hexagons) -->
        <!-- Top row left: First aid kit -->
        <rect x="40" y="10" width="6" height="5" rx="0.5" fill="none" stroke="#f5f5f5" stroke-width="0.9"/>
        <line x1="43" y1="11" x2="43" y2="14" stroke="#f5f5f5" stroke-width="0.9"/>
        <line x1="41.5" y1="12.5" x2="44.5" y2="12.5" stroke="#f5f5f5" stroke-width="0.9"/>
        <!-- Top row mid: Drone -->
        <line x1="59" y1="14" x2="65" y2="14" stroke="#f5f5f5" stroke-width="0.8"/>
        <circle cx="60" cy="12" r="1.8" fill="none" stroke="#f5f5f5" stroke-width="0.6"/>
        <circle cx="64" cy="12" r="1.8" fill="none" stroke="#f5f5f5" stroke-width="0.6"/>
        <circle cx="60" cy="16" r="1.8" fill="none" stroke="#f5f5f5" stroke-width="0.6"/>
        <circle cx="64" cy="16" r="1.8" fill="none" stroke="#f5f5f5" stroke-width="0.6"/>
        <!-- Upper left: AED -->
        <rect x="30" y="27" width="6" height="5" rx="0.5" fill="none" stroke="#f5f5f5" stroke-width="0.8"/>
        <path d="M31.5,30 L32.5,28 L33.5,31 L34.5,29" fill="none" stroke="#f5f5f5" stroke-width="0.6"/>
        <!-- Mid left top: Security camera -->
        <path d="M21,44 L25,42 L25,47 Z" fill="#f5f5f5"/>
        <rect x="25" y="43" width="4" height="3.5" rx="0.3" fill="none" stroke="#f5f5f5" stroke-width="0.8"/>
        <!-- Mid left top right: Hacker/cyber -->
        <circle cx="43" cy="42" r="3" fill="none" stroke="#f5f5f5" stroke-width="0.7"/>
        <rect x="39" y="45" width="8" height="4" rx="1" fill="none" stroke="#f5f5f5" stroke-width="0.7"/>
        <!-- Mid left bottom: Agriculture/plant -->
        <line x1="24" y1="58" x2="24" y2="68" stroke="#f5f5f5" stroke-width="0.9"/>
        <path d="M24,62 Q20,59 19,57" fill="none" stroke="#f5f5f5" stroke-width="0.8"/>
        <path d="M24,64 Q28,61 29,59" fill="none" stroke="#f5f5f5" stroke-width="0.8"/>
        <!-- Mid left bottom right: Crossed tools -->
        <line x1="40" y1="58" x2="46" y2="68" stroke="#f5f5f5" stroke-width="0.9"/>
        <line x1="46" y1="58" x2="40" y2="68" stroke="#f5f5f5" stroke-width="0.9"/>
        <!-- Lower left: Megaphone/comms -->
        <path d="M30,75 L36,72 L36,82 Z" fill="none" stroke="#f5f5f5" stroke-width="0.8"/>
        <line x1="30" y1="75" x2="28" y2="75" stroke="#f5f5f5" stroke-width="0.8"/>
        <!-- Lower right: Radio + Est. -->
        <rect x="49" y="73" width="5" height="8" rx="0.5" fill="none" stroke="#f5f5f5" stroke-width="0.7"/>
        <line x1="51.5" y1="73" x2="53.5" y2="71" stroke="#f5f5f5" stroke-width="0.7"/>
        <!-- Bottom left: Tractor/farm -->
        <rect x="39" y="91" width="7" height="4" rx="0.5" fill="none" stroke="#f5f5f5" stroke-width="0.7"/>
        <circle cx="41" cy="97" r="2" fill="none" stroke="#f5f5f5" stroke-width="0.7"/>
        <circle cx="45" cy="97" r="2" fill="none" stroke="#f5f5f5" stroke-width="0.7"/>
        <!-- Bottom mid: Walkie talkie -->
        <rect x="59" y="90" width="5" height="8" rx="0.5" fill="none" stroke="#f5f5f5" stroke-width="0.7"/>
        <line x1="61.5" y1="90" x2="63.5" y2="88" stroke="#f5f5f5" stroke-width="0.7"/>
      </svg>
      <div class="logo-text">CAROLINA<br>CAPABILITIES<br>CO-OP</div>
    </div>

    <div class="logo-divider"></div>

    <!-- LFHI — Shield with 4 quadrant icons + org name (matches real logo) -->
    <div class="logo-block">
      <svg width="100" height="120" viewBox="0 0 80 95" xmlns="http://www.w3.org/2000/svg">
        <!-- Outer shield border -->
        <path d="M5,15 L5,55 Q5,78 40,90 Q75,78 75,55 L75,15 Q57,10 40,5 Q23,10 5,15 Z" fill="#1a1a1a" stroke="#444" stroke-width="1.5"/>
        <!-- Inner shield -->
        <path d="M8,17 L8,54 Q8,75 40,87 Q72,75 72,54 L72,17 Q56,12 40,8 Q24,12 8,17 Z" fill="#2d2d2d" stroke="none"/>

        <!-- Top-left quadrant — RED (crosshair/target) -->
        <path d="M9,18 L9,47 L39,47 L39,18 Q24,13 9,18 Z" fill="#c92a2a"/>
        <!-- Top-right quadrant — DARK (Star of Life) -->
        <path d="M41,18 L41,47 L71,47 L71,18 Q56,13 41,18 Z" fill="#2d2d2d"/>
        <!-- Bottom-left quadrant — DARK (plant) -->
        <path d="M9,49 L9,54 Q9,74 40,86 L39,49 Z" fill="#2d2d2d"/>
        <!-- Bottom-right quadrant — RED (radio tower) -->
        <path d="M41,49 L40,86 Q71,74 71,54 L71,49 Z" fill="#c92a2a"/>

        <!-- Cross divider lines -->
        <line x1="40" y1="8" x2="40" y2="87" stroke="#1a1a1a" stroke-width="2"/>
        <line x1="9" y1="48" x2="71" y2="48" stroke="#1a1a1a" stroke-width="2"/>

        <!-- TL icon: Target reticle (concentric circles + crosshair) -->
        <circle cx="24" cy="32" r="8" fill="none" stroke="#f5f5f5" stroke-width="1.2"/>
        <circle cx="24" cy="32" r="4" fill="none" stroke="#f5f5f5" stroke-width="1"/>
        <circle cx="24" cy="32" r="1" fill="#f5f5f5"/>
        <line x1="14" y1="32" x2="34" y2="32" stroke="#f5f5f5" stroke-width="0.8"/>
        <line x1="24" y1="22" x2="24" y2="42" stroke="#f5f5f5" stroke-width="0.8"/>

        <!-- TR icon: Star of Life (6-pointed medical star) -->
        <g transform="translate(56,32)">
          <!-- 6 bars forming the star -->
          <rect x="-1.5" y="-9" width="3" height="18" rx="0.5" fill="#f5f5f5"/>
          <rect x="-1.5" y="-9" width="3" height="18" rx="0.5" fill="#f5f5f5" transform="rotate(60)"/>
          <rect x="-1.5" y="-9" width="3" height="18" rx="0.5" fill="#f5f5f5" transform="rotate(-60)"/>
        </g>

        <!-- BL icon: Plant/agriculture -->
        <line x1="24" y1="54" x2="24" y2="72" stroke="#f5f5f5" stroke-width="1.2"/>
        <!-- Left leaves -->
        <path d="M24,62 Q19,58 18,55" fill="none" stroke="#f5f5f5" stroke-width="1"/>
        <path d="M24,66 Q19,63 17,60" fill="none" stroke="#f5f5f5" stroke-width="1"/>
        <!-- Right leaves -->
        <path d="M24,60 Q29,56 30,53" fill="none" stroke="#f5f5f5" stroke-width="1"/>
        <path d="M24,64 Q29,61 30,58" fill="none" stroke="#f5f5f5" stroke-width="1"/>

        <!-- BR icon: Radio/comms tower -->
        <!-- Tower structure -->
        <line x1="56" y1="53" x2="56" y2="73" stroke="#f5f5f5" stroke-width="1.5"/>
        <line x1="51" y1="73" x2="56" y2="60" stroke="#f5f5f5" stroke-width="1"/>
        <line x1="61" y1="73" x2="56" y2="60" stroke="#f5f5f5" stroke-width="1"/>
        <!-- Cross braces -->
        <line x1="53" y1="67" x2="59" y2="67" stroke="#f5f5f5" stroke-width="0.7"/>
        <!-- Signal waves -->
        <path d="M50,56 Q53,52 56,56" fill="none" stroke="#f5f5f5" stroke-width="0.8"/>
        <path d="M56,56 Q59,52 62,56" fill="none" stroke="#f5f5f5" stroke-width="0.8"/>
        <path d="M48,59 Q52,54 56,59" fill="none" stroke="#f5f5f5" stroke-width="0.6"/>
        <path d="M56,59 Q60,54 64,59" fill="none" stroke="#f5f5f5" stroke-width="0.6"/>
      </svg>
      <div class="logo-text">LIGHT FIGHTER<br>HOMEFRONT</div>
    </div>

  </div>

  <div class="time" id="clock">00:00</div>
  <div class="tap-hint">tap to wake</div>
</div>

<script>
  /* ── Tap to wake — return to kiosk dashboard ──────────────────── */
  document.addEventListener('touchstart', function () {
    window.location.href = '/kiosk.html';
  });
  document.addEventListener('click', function () {
    window.location.href = '/kiosk.html';
  });

  /* ── Clock — reads time format preference from localStorage ───── */
  var timeFormat = localStorage.getItem('timeFormat') || '12h';

  function updateClock() {
    var now = new Date();
    var h = now.getHours();
    var m = String(now.getMinutes()).padStart(2, '0');
    if (timeFormat === '12h') {
      var ampm = h >= 12 ? 'PM' : 'AM';
      h = h % 12 || 12;
      document.getElementById('clock').textContent = h + ':' + m + ' ' + ampm;
    } else {
      document.getElementById('clock').textContent = String(h).padStart(2, '0') + ':' + m;
    }
  }
  setInterval(updateClock, 1000);
  updateClock();

  /* ── Bouncing animation — DVD-logo style ──────────────────────── */
  var floater = document.getElementById('floater');
  var W = 1280;
  var H = 400;
  var fw = 640;  /* approximate floater width — logos + text + divider */
  var fh = 220;  /* approximate floater height — logos + clock */

  /* Start at a random position */
  var x = Math.random() * (W - fw);
  var y = Math.random() * (H - fh);

  /* Slow, gentle drift — pixels per frame at ~60fps */
  var dx = 0.4 + Math.random() * 0.3;
  var dy = 0.3 + Math.random() * 0.2;

  /* Randomize initial direction */
  if (Math.random() > 0.5) dx = -dx;
  if (Math.random() > 0.5) dy = -dy;

  function animate() {
    x += dx;
    y += dy;

    /* Bounce off edges */
    if (x <= 0) { x = 0; dx = Math.abs(dx); }
    if (x >= W - fw) { x = W - fw; dx = -Math.abs(dx); }
    if (y <= 0) { y = 0; dy = Math.abs(dy); }
    if (y >= H - fh) { y = H - fh; dy = -Math.abs(dy); }

    floater.style.left = x + 'px';
    floater.style.top = y + 'px';

    requestAnimationFrame(animate);
  }
  animate();

  /* ── Background stars — procedurally generated ────────────────── */
  (function () {
    var container = document.getElementById('stars');
    var count = 40;
    for (var i = 0; i < count; i++) {
      var star = document.createElement('div');
      star.className = 'star';
      star.style.left = Math.random() * W + 'px';
      star.style.top = Math.random() * H + 'px';
      star.style.setProperty('--duration', (3 + Math.random() * 6) + 's');
      star.style.setProperty('--delay', (Math.random() * 5) + 's');
      star.style.setProperty('--brightness', (0.08 + Math.random() * 0.15));
      container.appendChild(star);
    }
  }());
</script>
</body>
</html>
