  # /home/i2pd/tunnels.conf
  # i2pd server tunnel configuration — Community Node Pi #1
  #
  # Tunnels define the I2P hidden services ("eepsites") this node publishes.
  # Each tunnel gets a persistent .b32.i2p address derived from its key file.
  # The key file is auto-generated on first start and stored in the i2pd
  # data directory — back it up to preserve the .b32.i2p address.
  #
  # type = http means i2pd acts as an HTTP server tunnel — it accepts
  # connections from the I2P network and forwards them to the specified
  # host:port on the Docker internal network.
  #
  # Find your .b32.i2p addresses in the i2pd web console:
  #   http://192.168.8.10:7070 → I2P tunnels → Server tunnels

  # ── Matrix API tunnel ─────────────────────────────────────────────────────────
  # Publishes the Matrix homeserver API on I2P.
  # I2P users can connect their Matrix client to this .b32.i2p address
  # to register, login, and send messages without clearnet.
  # Routes to nginx:80 which proxies to Conduit — same path as LAN access.
  [matrix-i2p]
  type = http
  host = nginx       # container name resolves on the community-net Docker network
  port = 80
  keys = matrix-i2p.dat   # key file stored in ./data/i2pd/ — back this up

  # ── Community web eepsite ─────────────────────────────────────────────────────
  # Publishes the static community info page on I2P as an eepsite.
  # I2P users can browse to this .b32.i2p address to find node info,
  # .onion addresses, and instructions for joining the community.
  # Routes to nginx:8081 which serves files from ./data/community-web/.
  [community-eepsite]
  type = http
  host = nginx       # container name resolves on the community-net Docker network
  port = 8081
  keys = community-eepsite.dat   # key file stored in ./data/i2pd/ — back this up

  Save and exit. Done?
