  # /home/i2pd/i2pd.conf
  # i2pd configuration — I2P router for Community Node Pi #1
  #
  # i2pd is a C++ implementation of I2P (Invisible Internet Project).
  # I2P is a private network layer that routes traffic through volunteer
  # nodes using layered encryption and one-way "tunnels". Unlike Tor which
  # is optimized for clearnet exit traffic, I2P is designed for persistent
  # hidden services (.i2p addresses called "eepsites").
  #
  # In this build i2pd provides:
  #   - A .b32.i2p address for the Matrix API (see tunnels.conf)
  #   - A .b32.i2p eepsite for the community web page (see tunnels.conf)
  #   - HTTP/SOCKS proxies so LAN clients can browse .i2p sites
  #
  # NOTE: i2pd runs as UID 100:65533 inside the container.
  # The data directory must be owned accordingly:
  #   sudo chown -R 100:65533 /opt/community-node/data/i2pd
  #
  # NOTE: This config file is largely ignored by the container at runtime.
  # The compose file passes critical settings as CLI flags instead to ensure
  # they are applied. This file is kept for reference and documents intent.

  [general]
  # Log level — warn keeps logs quiet during normal operation.
  # Use "info" or "debug" when troubleshooting tunnel issues.
  loglevel = warn

  # Log file location inside the container (mapped to ./data/i2pd on host).
  logfile = /home/i2pd/data/i2pd.log

  [system]
  # Bandwidth class controls how much traffic this router shares with the
  # I2P network. L = 32 KBps shared bandwidth — low profile, conserves
  # Pi resources while still participating enough to build good tunnels.
  # Options: L (32K) | P (256K) | O (2048K) | X (unlimited)
  bandwidth = L

  [http]
  # Web console — shows router stats, tunnel status, and .b32.i2p addresses.
  # Access at http://192.168.8.10:7070 from LAN.
  # address = 0.0.0.0 required so the console is reachable outside the container.
  # --http.strictheaders=false (set via CLI flag in compose) allows access by IP
  # without a matching hostname header.
  enabled = true
  address = 0.0.0.0
  port = 7070

  [httpproxy]
  # HTTP proxy — point your browser at this to browse .i2p eepsites.
  # Configure browser proxy settings to 192.168.8.10:4444 (HTTP proxy).
  enabled = true
  address = 0.0.0.0
  port = 4444

  [socksproxy]
  # SOCKS5 proxy — general purpose proxy for apps that support SOCKS.
  # Configure apps to use 192.168.8.10:4447 as SOCKS5 proxy.
  enabled = true
  address = 0.0.0.0
  port = 4447

  [sam]
  # SAM (Simple Anonymous Messaging) bridge — API that lets applications
  # create I2P connections programmatically without being a full router.
  # Used by apps that want to send/receive over I2P natively.
  enabled = true
  address = 0.0.0.0
  port = 7656

  [ntcp2]
  # NTCP2 — encrypted TCP transport protocol for I2P router-to-router traffic.
  # port = 0 means i2pd picks a random available port automatically.
  enabled = true
  port = 0

  [ssu2]
  # SSU2 — encrypted UDP transport protocol for I2P router-to-router traffic.
  # Having both NTCP2 and SSU2 enabled improves connectivity to more peers.
  # port = 0 = auto-assign.
  enabled = true
  port = 0
