  # /etc/nginx/nginx.conf
  # Nginx reverse proxy configuration — Community Node Pi #1
  #
  # Nginx is the single entry point for ALL inbound traffic to this node.
  # No service is exposed directly to the LAN — everything routes through here.
  # This gives us rate limiting, TLS termination, and clean URL routing in
  # one place.
  #
  # Traffic flow:
  #   LAN client           → port 80  → nginx → conduit:6167
  #   Cloudflare Tunnel    → port 80  → nginx → conduit:6167
  #   Local HTTPS client   → port 443 → nginx (TLS) → conduit:6167
  #   Tor hidden service   → port 80  → nginx → conduit:6167  (Matrix)
  #   Tor hidden service   → port 8080 → nginx → element-web:80
  #   Tor/I2P              → port 8081 → nginx → static files
  #   Matrix federation    → port 8448 → nginx (TLS) → conduit:6167

  worker_processes auto;        # one worker per CPU core — Pi 5 has 4 cores
  error_log /var/log/nginx/error.log warn;

  events {
      # Max simultaneous connections per worker.
      # 256 is conservative for a Pi — increase to 512 if you see dropped connections.
      worker_connections 256;
  }

  http {
      include /etc/nginx/mime.types;
      default_type application/octet-stream;
      sendfile on;
      keepalive_timeout 65;

      # Maximum upload size — applies to Matrix media uploads (images, files).
      # Must match max_request_size in conduit.toml (both set to 20MB).
      client_max_body_size 20M;

      # ── Rate limiting ─────────────────────────────────────────────────────────
      # Protects against abuse and brute-force attacks.
      # Zones are stored in shared memory (10m = ~160,000 unique IPs tracked).
      #
      # matrix zone: 30 requests/sec — generous for Matrix sync traffic
      # general zone: 10 requests/sec — for web pages and Element UI
      limit_req_zone $binary_remote_addr zone=matrix:10m rate=30r/s;
      limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;

      # ── Server Block 1: Matrix API — HTTP (port 80) ───────────────────────────
      # Handles:
      #   - LAN clients accessing Matrix by Pi IP (192.168.8.10)
      #   - Cloudflare Tunnel ingress (CF terminates HTTPS, delivers HTTP here)
      #   - Tor hidden service traffic (Tor handles encryption, delivers HTTP)
      #
      # .well-known endpoints tell Matrix clients and servers where to find
      # the homeserver — this is "delegation", allowing yourdomain.com to
      # host Matrix without needing the API on port 443 of the root domain.

      server {
          listen 80;
          listen [::]:80;
          server_name _;    # accept any hostname — node has no fixed DNS on LAN

          limit_req zone=matrix burst=50 nodelay;

          # Matrix server discovery — used by OTHER servers federating with us.
          # Tells them: "the Matrix server for yourdomain.com is at matrix.yourdomain.com:443"
          location /.well-known/matrix/server {
              default_type application/json;
              add_header Access-Control-Allow-Origin *;
              return 200 '{"m.server":"m2-matrix.yourdomain.com:443"}';
          }

          # Matrix client discovery — used by client apps to find the API URL.
          # Tells them: "connect to https://matrix.yourdomain.com"
          location /.well-known/matrix/client {
              default_type application/json;
              add_header Access-Control-Allow-Origin *;
              return 200 '{"m.homeserver":{"base_url":"https://m2-matrix.yourdomain.com"}}';
          }

          # All other traffic → Conduit homeserver
          location / {
              proxy_pass http://conduit:6167;
              proxy_set_header Host $host;
              proxy_set_header X-Real-IP $remote_addr;
              proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto $scheme;
              proxy_buffering off;    # required for Matrix long-poll sync requests
          }
      }

      # ── Server Block 2: Matrix API — HTTPS (port 443) ────────────────────────
      # Handles local TLS connections — useful for clients that require HTTPS
      # even on LAN (some Matrix clients refuse plain HTTP).
      # Uses a self-signed cert (generated in Phase 4.5) — browsers will warn,
      # but native Matrix clients typically accept it with a one-time prompt.
      #
      # Tor hidden service also uses this path when connecting via HTTPS —
      # though Tor traffic is now routed to port 80 (HTTP) to avoid cert warnings
      # in Tor Browser. This block remains for LAN HTTPS use.
      server {
          listen 443 ssl;
          listen [::]:443 ssl;
          server_name _;

          # Self-signed cert — valid for 10 years, CN=community.local
          # Generated with: openssl req -x509 -newkey rsa:4096 ...
          ssl_certificate /etc/letsencrypt/live/m2-matrix.yourdomain.com/fullchain.pem;
          ssl_certificate_key /etc/letsencrypt/live/m2-matrix.yourdomain.com/privkey.pem;
          ssl_protocols TLSv1.2 TLSv1.3;
          ssl_ciphers HIGH:!aNULL:!MD5;

          limit_req zone=matrix burst=50 nodelay;

          location /.well-known/matrix/server {
              default_type application/json;
              add_header Access-Control-Allow-Origin *;
              return 200 '{"m.server":"m2-matrix.yourdomain.com:443"}';
          }

          location /.well-known/matrix/client {
              default_type application/json;
              add_header Access-Control-Allow-Origin *;
              return 200 '{"m.homeserver":{"base_url":"https://m2-matrix.yourdomain.com"}}';
          }

          location / {
              proxy_pass http://conduit:6167;
              proxy_set_header Host $host;
              proxy_set_header X-Real-IP $remote_addr;
              proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto https;    # always report HTTPS upstream
              proxy_buffering off;
          }
      }

      # ── Server Block 3: Matrix Federation (port 8448) ────────────────────────
      # Matrix federation traffic between homeservers uses port 8448 by default.
      # When another Matrix server (e.g., matrix.org) wants to deliver a message
      # to a user on yourdomain.com, it connects here.
      # TLS required for federation — uses same self-signed cert as port 443.
      # Note: federation only works reliably over clearnet with a valid cert.
      server {
          listen 8448 ssl;
          listen [::]:8448 ssl;
          server_name _;

          ssl_certificate /etc/letsencrypt/live/m2-matrix.yourdomain.com/fullchain.pem;
          ssl_certificate_key /etc/letsencrypt/live/m2-matrix.yourdomain.com/privkey.pem;
          ssl_protocols TLSv1.2 TLSv1.3;

          location / {
              proxy_pass http://conduit:6167;
              proxy_set_header Host $host;
              proxy_set_header X-Real-IP $remote_addr;
              proxy_buffering off;
          }
      }

      # ── Server Block 4: Element Web (port 8080) ───────────────────────────────
      # Serves the Element Web Matrix client UI.
      # Accessible on LAN at http://192.168.8.10:8080
      # Also exposed via Tor hidden service (element .onion address → port 8080)
      # and I2P (community-eepsite tunnel → port 8081 serves web, not this block).
      # No TLS here — Element is a static web app; the Matrix API connection
      # from the browser to Conduit handles its own security.
      server {
          listen 8080;
          listen [::]:8080;
          server_name _;

          limit_req zone=general burst=20 nodelay;

          location / {
              proxy_pass http://element-web:80;    # element-web container serves on port 80 internally
              proxy_set_header Host $host;
              proxy_set_header X-Real-IP $remote_addr;
          }
      }

      # ── Server Block 5: Community Web (port 8081) ─────────────────────────────
      # Serves static HTML pages from ./data/community-web/ on the host.
      # Purpose: a landing page for new community members explaining how to
      # connect, with .onion addresses, QR codes, and join instructions.
      # Accessible on LAN at http://192.168.8.10:8081
      # Also exposed via:
      #   - Tor hidden service (community_hidden_service → port 8081)
      #   - I2P eepsite (community-eepsite tunnel in tunnels.conf → port 8081)
      server {
          listen 8081;
          listen [::]:8081;
          server_name _;

          limit_req zone=general burst=20 nodelay;

          root /var/www/html;      # mapped to /opt/community-node/data/community-web/
          index index.html;

          location / {
              try_files $uri $uri/ /index.html;    # serve file if exists, 404 if not
          }
      }


  }
